name: Build Native Windows App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore src-native/EDPrintTool/EDPrintTool.csproj

      - name: Publish self-contained exe
        run: >
          dotnet publish src-native/EDPrintTool/EDPrintTool.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish

      # Zip the exe + public folder for release download
      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path ./publish/EDPrintTool.exe, ./publish/public -DestinationPath ./EDPrintTool-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EDPrintTool-native-win-x64
          path: |
            ./publish/EDPrintTool.exe
            ./publish/public/**
          retention-days: 90

      # Create GitHub Release when a version tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./EDPrintTool-win-x64.zip
          generate_release_notes: true
